      - name: searchcontacts
        method: GET
        description: Google People Search Contacts
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
        - name: readMask
          in: query
          type: string
          required: true
        - name: pageSize
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: people-createcontact
      path: /people:createContact
      operations:
      - name: createcontact
        method: POST
        description: Google People Create Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: people-resourcename-deletecontact
      path: /people/{resourceName}:deleteContact
      operations:
      - name: deletecontact
        method: DELETE
        description: Google People Delete Contact
        inputParameters:
        - name: resourceName
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: people-resourcename-updatecontact
      path: /people/{resourceName}:updateContact
      operations:
      - name: updatecontact
        method: PATCH
        description: Google People Update Contact
        inputParameters:
        - name: resourceName
          in: path
          type: string
          required: true
        - name: updatePersonFields
          in: query
