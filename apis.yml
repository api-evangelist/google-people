name: Google People API
description: >-
  The Google People API provides access to information about profiles and
  contacts. It enables reading and managing the authenticated user's contacts,
  contact groups, and profile information across Google services.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/google-people/refs/heads/main/apis.yml
created: '2026-03-13'
modified: '2026-03-13'
specificationVersion: '0.18'
tags:
  - People
  - Contacts
  - Profiles
  - Address Book
  - Google
apis:
  - name: Google People API
    description: >-
      Provides access to Google Contacts data including creating, reading,
      updating, and deleting contacts and contact groups, searching contacts,
      and accessing profile information.
    humanURL: https://developers.google.com/people
    baseURL: https://people.googleapis.com/v1
    properties:
      - type: OpenAPI
        url: openapi/openapi.yml
      - type: JSONSchema
        url: json-schema/Person.json
    tags:
      - People
      - Contacts
      - Profiles
common:
